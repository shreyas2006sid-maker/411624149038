<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Website</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    
    <nav>
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Contact</a>
    </nav>

    <h1>Responsive Website</h1>

    <img src="butterfly.jpg" alt="Sample Image">

    
    <div class="video-container">
        <video controls>
            <source src="sample.mp4" type="video/mp4">
        </video>
    </div>

    <table>
        <tr>
            <th>1</th>
            <th>Some Text</th>
            <th>Some Text</th>
        </tr>
        <tr>
            <td>2</td>
            <td>Some Text</td>
            <td>Some Text</td>
        </tr>
        <tr>
            <td>3</td>
            <td>Some Text</td>
            <td>Some Text</td>
        </tr>
    </table>

    <button>Click Me</button>

    
    <div class="grid">
        <div>1</div>
        <div>2</div>
        <div>3</div>
        <div>4</div>
        <div>5</div>
        <div>6</div>
        <div>7</div>
        <div>8</div>
    </div>

</body>
</html>
